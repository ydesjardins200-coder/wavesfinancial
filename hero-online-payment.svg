<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#04030c"/>
      <stop offset="35%"  stop-color="#080618"/>
      <stop offset="65%"  stop-color="#0a0a22"/>
      <stop offset="100%" stop-color="#080e20"/>
    </linearGradient>
    <linearGradient id="aurora1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#5B52D8" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#7B74F0" stop-opacity="0.45"/>
      <stop offset="55%"  stop-color="#1DE9C6" stop-opacity="0.38"/>
      <stop offset="80%"  stop-color="#00E5FF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aurora2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1DE9C6" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#00E5FF" stop-opacity="0.22"/>
      <stop offset="60%"  stop-color="#5B52D8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#5B52D8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="treeline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080618"/>
      <stop offset="100%" stop-color="#030410"/>
    </linearGradient>
    <linearGradient id="lake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080e20"/>
      <stop offset="100%" stop-color="#040810"/>
    </linearGradient>
    <radialGradient id="lake_glow" cx="50%" cy="0%" r="80%">
      <stop offset="0%"   stop-color="#1DE9C6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starglow"><feGaussianBlur stdDeviation="0.5"/></filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="100%" stop-color="#020108" stop-opacity="0.65"/>
    </radialGradient>
  </defs>

  <rect width="1440" height="900" fill="url(#sky)"/>

  <!-- Stars -->
  <g filter="url(#starglow)">
    <circle cx="80"   cy="40"  r="0.8" fill="white" opacity="0.65"/>
    <circle cx="220"  cy="20"  r="0.7" fill="#c8e8ff" opacity="0.7"/>
    <circle cx="380"  cy="50"  r="0.9" fill="white" opacity="0.6"/>
    <circle cx="540"  cy="18"  r="0.7" fill="white" opacity="0.58"/>
    <circle cx="700"  cy="42"  r="0.8" fill="#d0f0ff" opacity="0.65"/>
    <circle cx="860"  cy="22"  r="0.9" fill="white" opacity="0.6"/>
    <circle cx="1020" cy="48"  r="0.7" fill="white" opacity="0.55"/>
    <circle cx="1180" cy="25"  r="0.8" fill="#c8e8ff" opacity="0.65"/>
    <circle cx="1360" cy="44"  r="0.7" fill="white" opacity="0.58"/>
    <circle cx="150"  cy="90"  r="0.6" fill="white" opacity="0.4"/>
    <circle cx="320"  cy="105" r="0.7" fill="white" opacity="0.42"/>
    <circle cx="480"  cy="78"  r="0.6" fill="white" opacity="0.38"/>
    <circle cx="650"  cy="100" r="0.7" fill="white" opacity="0.4"/>
    <circle cx="820"  cy="82"  r="0.6" fill="white" opacity="0.38"/>
    <circle cx="990"  cy="96"  r="0.7" fill="white" opacity="0.4"/>
    <circle cx="1150" cy="78"  r="0.6" fill="white" opacity="0.36"/>
    <circle cx="1310" cy="102" r="0.7" fill="white" opacity="0.38"/>
    <circle cx="440"  cy="130" r="0.5" fill="white" opacity="0.28"/>
    <circle cx="760"  cy="120" r="0.6" fill="white" opacity="0.3"/>
    <circle cx="1080" cy="132" r="0.5" fill="white" opacity="0.28"/>
  </g>

  <!-- Aurora band 1 -->
  <ellipse cx="680" cy="220" rx="820" ry="90" fill="url(#aurora1)" opacity="0.8" transform="rotate(-5 680 220)"/>
  <!-- Aurora band 2 -->
  <ellipse cx="760" cy="170" rx="680" ry="60" fill="url(#aurora2)" opacity="0.65" transform="rotate(4 760 170)"/>
  <!-- Aurora vertical curtains -->
  <g stroke="#1DE9C6" stroke-width="1" opacity="0.12" fill="none">
    <line x1="280" y1="130" x2="265" y2="320"/>
    <line x1="420" y1="120" x2="408" y2="305"/>
    <line x1="560" y1="112" x2="550" y2="295"/>
    <line x1="700" y1="115" x2="692" y2="298"/>
    <line x1="840" y1="118" x2="834" y2="300"/>
    <line x1="980" y1="122" x2="976" y2="304"/>
    <line x1="1120" y1="128" x2="1117" y2="308"/>
  </g>
  <g stroke="#5B52D8" stroke-width="0.8" opacity="0.1" fill="none">
    <line x1="350" y1="140" x2="338" y2="310"/>
    <line x1="490" y1="130" x2="480" y2="300"/>
    <line x1="630" y1="125" x2="622" y2="295"/>
    <line x1="770" y1="128" x2="764" y2="298"/>
    <line x1="910" y1="132" x2="905" y2="302"/>
    <line x1="1050" y1="136" x2="1046" y2="306"/>
  </g>

  <!-- Conifer treeline both sides -->
  <g fill="url(#treeline)" opacity="0.95">
    <!-- Left -->
    <polygon points="0,900   18,790  36,900"/>
    <polygon points="28,900  48,768  68,900"/>
    <polygon points="58,900  80,750  102,900"/>
    <polygon points="90,900  114,760 138,900"/>
    <polygon points="122,900 148,752 174,900"/>
    <polygon points="155,900 182,765 209,900"/>
    <polygon points="188,900 216,778 244,900"/>
    <polygon points="222,900 250,770 278,900"/>
    <!-- Right -->
    <polygon points="1162,900 1190,770 1218,900"/>
    <polygon points="1196,900 1226,758 1256,900"/>
    <polygon points="1232,900 1264,748 1296,900"/>
    <polygon points="1270,900 1304,755 1338,900"/>
    <polygon points="1310,900 1346,762 1382,900"/>
    <polygon points="1352,900 1390,750 1428,900"/>
    <polygon points="1396,900 1434,768 1440,900"/>
  </g>

  <!-- Lake -->
  <path d="M0 600 Q360 585 720 590 Q1080 595 1440 580 L1440 900 L0 900 Z"
    fill="url(#lake)"/>
  <path d="M0 600 Q360 585 720 590 Q1080 595 1440 580 L1440 900 L0 900 Z"
    fill="url(#lake_glow)"/>

  <!-- Aurora reflection -->
  <ellipse cx="720" cy="680" rx="600" ry="30" fill="#1DE9C6" opacity="0.06" filter="url(#softglow)"/>
  <ellipse cx="720" cy="685" rx="280" ry="12" fill="#00E5FF" opacity="0.07"/>

  <!-- Ripple lines on lake -->
  <g stroke="#1DE9C6" stroke-width="0.7" opacity="0.07" fill="none">
    <path d="M120 640 Q360 632 600 636 Q840 640 1080 633 Q1200 629 1320 633"/>
    <path d="M0   665 Q240 657 480 661 Q720 665 960 658 Q1100 654 1320 658 Q1380 660 1440 656"/>
    <path d="M60  692 Q300 684 540 688 Q780 692 1020 685 Q1200 680 1380 684"/>
  </g>

  <!-- Vignette -->
  <rect width="1440" height="900" fill="url(#vignette)"/>
</svg>