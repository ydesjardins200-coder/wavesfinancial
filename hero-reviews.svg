<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#07060f"/>
      <stop offset="20%"  stop-color="#0e0c20"/>
      <stop offset="45%"  stop-color="#141030"/>
      <stop offset="68%"  stop-color="#1c1640"/>
      <stop offset="85%"  stop-color="#261e52"/>
      <stop offset="100%" stop-color="#2e2460"/>
    </linearGradient>
    <radialGradient id="star_cluster" cx="35%" cy="28%" r="40%">
      <stop offset="0%"   stop-color="#5B52D8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="horizon_glow" cx="50%" cy="100%" r="50%">
      <stop offset="0%"   stop-color="#4040c0" stop-opacity="0.3"/>
      <stop offset="40%"  stop-color="#2828a0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="headland_far" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1c1640"/>
      <stop offset="100%" stop-color="#100e28"/>
    </linearGradient>
    <linearGradient id="headland_mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#141030"/>
      <stop offset="100%" stop-color="#0c0a20"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0e0c28"/>
      <stop offset="55%"  stop-color="#080818"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>
    <radialGradient id="ocean_shimmer" cx="50%" cy="0%" r="70%">
      <stop offset="0%"   stop-color="#3030a0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="shore_rock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#181430"/>
      <stop offset="100%" stop-color="#0c0a1e"/>
    </linearGradient>
    <linearGradient id="foreground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#100e22"/>
      <stop offset="100%" stop-color="#06050e"/>
    </linearGradient>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starglow"><feGaussianBlur stdDeviation="0.5"/></filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="100%" stop-color="#030210" stop-opacity="0.62"/>
    </radialGradient>
  </defs>

  <rect width="1440" height="900" fill="url(#sky)"/>
  <rect width="1440" height="900" fill="url(#star_cluster)"/>
  <rect width="1440" height="900" fill="url(#horizon_glow)"/>

  <!-- Dense Milky Way band — upper left to centre -->
  <g filter="url(#starglow)">
    <!-- Milky Way scatter -->
    <circle cx="60"   cy="55"  r="0.6" fill="white" opacity="0.65"/>
    <circle cx="105"  cy="30"  r="0.8" fill="#c8c0ff" opacity="0.7"/>
    <circle cx="150"  cy="68"  r="0.5" fill="white" opacity="0.55"/>
    <circle cx="195"  cy="20"  r="0.9" fill="white" opacity="0.75"/>
    <circle cx="240"  cy="48"  r="0.6" fill="#d0c8ff" opacity="0.6"/>
    <circle cx="285"  cy="32"  r="0.7" fill="white" opacity="0.65"/>
    <circle cx="330"  cy="62"  r="0.5" fill="white" opacity="0.5"/>
    <circle cx="375"  cy="18"  r="0.8" fill="#c8c0ff" opacity="0.7"/>
    <circle cx="420"  cy="44"  r="0.6" fill="white" opacity="0.6"/>
    <circle cx="465"  cy="28"  r="0.7" fill="white" opacity="0.65"/>
    <circle cx="510"  cy="58"  r="0.5" fill="white" opacity="0.5"/>
    <circle cx="555"  cy="15"  r="0.9" fill="#d8d0ff" opacity="0.75"/>
    <circle cx="600"  cy="40"  r="0.6" fill="white" opacity="0.55"/>
    <circle cx="645"  cy="25"  r="0.7" fill="white" opacity="0.6"/>
    <circle cx="700"  cy="50"  r="0.8" fill="#c8c0ff" opacity="0.65"/>
    <circle cx="760"  cy="22"  r="0.6" fill="white" opacity="0.55"/>
    <circle cx="820"  cy="45"  r="0.7" fill="white" opacity="0.6"/>
    <circle cx="880"  cy="18"  r="0.8" fill="#d0c8ff" opacity="0.7"/>
    <circle cx="940"  cy="40"  r="0.5" fill="white" opacity="0.5"/>
    <circle cx="1000" cy="25"  r="0.7" fill="white" opacity="0.6"/>
    <circle cx="1060" cy="52"  r="0.6" fill="white" opacity="0.55"/>
    <circle cx="1120" cy="20"  r="0.8" fill="#c8c0ff" opacity="0.65"/>
    <circle cx="1180" cy="42"  r="0.6" fill="white" opacity="0.55"/>
    <circle cx="1240" cy="28"  r="0.7" fill="white" opacity="0.6"/>
    <circle cx="1300" cy="55"  r="0.5" fill="white" opacity="0.5"/>
    <circle cx="1360" cy="18"  r="0.8" fill="#d0c8ff" opacity="0.65"/>
    <circle cx="1410" cy="40"  r="0.6" fill="white" opacity="0.55"/>
    <!-- Second row -->
    <circle cx="82"   cy="100" r="0.5" fill="white" opacity="0.4"/>
    <circle cx="170"  cy="115" r="0.6" fill="white" opacity="0.42"/>
    <circle cx="260"  cy="92"  r="0.5" fill="white" opacity="0.38"/>
    <circle cx="355"  cy="108" r="0.7" fill="white" opacity="0.44"/>
    <circle cx="450"  cy="88"  r="0.5" fill="white" opacity="0.38"/>
    <circle cx="545"  cy="112" r="0.6" fill="white" opacity="0.4"/>
    <circle cx="640"  cy="95"  r="0.5" fill="white" opacity="0.38"/>
    <circle cx="735"  cy="118" r="0.6" fill="white" opacity="0.42"/>
    <circle cx="830"  cy="90"  r="0.5" fill="white" opacity="0.38"/>
    <circle cx="925"  cy="110" r="0.7" fill="white" opacity="0.4"/>
    <circle cx="1020" cy="85"  r="0.5" fill="white" opacity="0.36"/>
    <circle cx="1115" cy="105" r="0.6" fill="white" opacity="0.4"/>
    <circle cx="1210" cy="92"  r="0.5" fill="white" opacity="0.36"/>
    <circle cx="1305" cy="112" r="0.6" fill="white" opacity="0.38"/>
    <circle cx="1395" cy="88"  r="0.5" fill="white" opacity="0.36"/>
  </g>

  <!-- Far headland — right side -->
  <path d="M900 560 Q960 530 1020 548 Q1080 566 1140 540
           Q1200 514 1260 535 Q1320 556 1380 535 L1440 528
           L1440 900 L900 900 Z"
    fill="url(#headland_far)"/>

  <!-- Far headland — left side (lower) -->
  <path d="M0 590 Q60 568 120 580 Q180 592 240 572
           Q300 552 360 568 Q420 584 480 565
           Q520 552 550 560 L550 900 L0 900 Z"
    fill="url(#headland_far)"/>

  <!-- Mid coastal ridge -->
  <path d="M0 630
    Q60 608 125 620 Q190 632 255 612 Q320 592 385 608
    Q450 624 515 606 Q570 591 620 602
    Q670 613 730 598 Q790 583 850 598
    Q910 613 970 598 Q1030 583 1090 596
    Q1150 609 1210 596 Q1270 583 1330 596 Q1390 609 1440 598
    L1440 900 L0 900 Z"
    fill="url(#headland_mid)"/>

  <!-- Ocean -->
  <path d="M0 658 Q360 644 720 648 Q1080 652 1440 640
           L1440 900 L0 900 Z"
    fill="url(#ocean)"/>
  <path d="M0 658 Q360 644 720 648 Q1080 652 1440 640
           L1440 900 L0 900 Z"
    fill="url(#ocean_shimmer)"/>

  <!-- Gentle ocean ripples -->
  <g stroke="#5040a0" stroke-width="0.8" opacity="0.1" fill="none">
    <path d="M0 700 Q240 693 480 697 Q720 701 960 694 Q1200 687 1440 692"/>
    <path d="M0 725 Q240 718 480 722 Q720 726 960 719 Q1200 712 1440 717"/>
    <path d="M80 750 Q320 743 560 747 Q800 751 1040 744 Q1280 737 1440 742"/>
  </g>

  <!-- Star reflection on water -->
  <ellipse cx="720" cy="695" rx="500" ry="20"
           fill="#4040c0" opacity="0.07" filter="url(#softglow)"/>

  <!-- Rocky shoreline -->
  <path d="M0 762 Q80 750 160 756 Q240 762 320 752
           Q400 742 480 750 Q560 758 640 748
           Q720 738 800 746 Q880 754 960 744
           Q1040 734 1120 742 Q1200 750 1280 742
           Q1360 734 1440 740
           L1440 900 L0 900 Z"
    fill="url(#shore_rock)"/>

  <!-- Tide pool rocks — scattered boulders -->
  <g fill="#0e0c1e" opacity="0.9">
    <ellipse cx="95"   cy="774" rx="30" ry="12"/>
    <ellipse cx="220"  cy="768" rx="22" ry="9"/>
    <ellipse cx="380"  cy="762" rx="28" ry="11"/>
    <ellipse cx="560"  cy="758" rx="20" ry="8"/>
    <ellipse cx="720"  cy="754" rx="35" ry="13"/>
    <ellipse cx="900"  cy="756" rx="24" ry="9"/>
    <ellipse cx="1080" cy="752" rx="30" ry="11"/>
    <ellipse cx="1260" cy="748" rx="22" ry="9"/>
    <ellipse cx="1400" cy="754" rx="28" ry="10"/>
  </g>
  <!-- Smaller rocks -->
  <g fill="#0c0a1a" opacity="0.8">
    <ellipse cx="155"  cy="778" rx="14" ry="6"/>
    <ellipse cx="305"  cy="772" rx="12" ry="5"/>
    <ellipse cx="475"  cy="766" rx="15" ry="6"/>
    <ellipse cx="640"  cy="762" rx="11" ry="5"/>
    <ellipse cx="815"  cy="758" rx="16" ry="6"/>
    <ellipse cx="990"  cy="756" rx="13" ry="5"/>
    <ellipse cx="1165" cy="750" rx="15" ry="6"/>
    <ellipse cx="1335" cy="748" rx="12" ry="5"/>
  </g>

  <!-- Foreground dark ground -->
  <path d="M0 800 Q360 788 720 792 Q1080 796 1440 784 L1440 900 L0 900 Z"
    fill="url(#foreground)"/>

  <!-- Constellation — Big Dipper in upper right -->
  <g fill="#c8c0ff" opacity="0.6">
    <circle cx="1150" cy="60"  r="1.4"/>
    <circle cx="1185" cy="52"  r="1.3"/>
    <circle cx="1222" cy="48"  r="1.4"/>
    <circle cx="1256" cy="55"  r="1.2"/>
    <circle cx="1280" cy="72"  r="1.3"/>
    <circle cx="1295" cy="92"  r="1.2"/>
    <circle cx="1258" cy="88"  r="1.3"/>
  </g>
  <g stroke="#c8c0ff" stroke-width="0.5" opacity="0.25" fill="none">
    <line x1="1150" y1="60"  x2="1185" y2="52"/>
    <line x1="1185" y1="52"  x2="1222" y2="48"/>
    <line x1="1222" y1="48"  x2="1256" y2="55"/>
    <line x1="1256" y1="55"  x2="1280" y2="72"/>
    <line x1="1280" y1="72"  x2="1295" y2="92"/>
    <line x1="1295" y1="92"  x2="1258" y2="88"/>
    <line x1="1258" y1="88"  x2="1256" y2="55"/>
  </g>

  <!-- Vignette -->
  <rect width="1440" height="900" fill="url(#vignette)"/>
</svg>