[build]
  publish = "."
  command = ""

[build.environment]
  NODE_VERSION = "20"

[context.production]
  publish = "."
  command = ""

# ── CACHE HEADERS ─────────────────────────────────────────────────────────────
# SVGs, PNGs, ICO — safe to cache for 1 year (rename file to bust)
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML — always revalidate so changes show up immediately
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Root index
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
