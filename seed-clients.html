<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Waves — Seed 14 Clients</title>
<style>
  body{font-family:monospace;background:#0D0B1F;color:#e0e6ff;padding:40px;max-width:900px;margin:0 auto;}
  h1{color:#A09AF5;margin-bottom:8px;}
  p{color:rgba(160,154,245,.6);margin-bottom:24px;font-size:.85rem;}
  button{padding:14px 32px;background:linear-gradient(135deg,#3B35B0,#5B52D8);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;font-family:monospace;}
  button:disabled{opacity:.4;cursor:not-allowed;}
  #log{margin-top:24px;padding:16px;background:#13112a;border:1px solid rgba(160,154,245,.15);border-radius:10px;font-size:.78rem;line-height:1.9;min-height:80px;white-space:pre-wrap;}
  .ok{color:#1DE9C6;} .err{color:#FF6B8A;} .info{color:#FFD166;}
</style>
</head>
<body>
<h1>🌊 Waves Financial — Seed 14 Clients</h1>
<p>Posts 14 complete loan applications through the Railway backend. Delete this file after use.</p>
<button id="btn" onclick="seed()">Insert 14 Dummy Clients</button>
<div id="log">Ready. Click the button to start.</div>
<script>
const RAILWAY='https://web-production-31ce.up.railway.app';
const FIRST=['Sophie','Liam','Emma','Noah','Olivia','Ethan','Ava','Mason','Isabella','Logan','Mia','Lucas','Charlotte','Aiden'];
const LAST=['Tremblay','Gagnon','Roy','Côté','Bouchard','Fortin','Gauthier','Morin','Lavoie','Leblanc','Martin','Bernard','Girard','Pelletier'];
const STREETS=['Maple Ave','Oak St','Pine Rd','Cedar Blvd','Elm Dr','Birch Ln','Willow Way','Spruce Cres'];
const EMPLOYERS=['Amazon Canada','Tim Hortons','Walmart Canada','Loblaws','Home Depot','FedEx','Shoppers Drug Mart','Bell Canada','Rogers','Sysco'];
const JOBS=['Warehouse Associate','Shift Supervisor','Cashier','Delivery Driver','Customer Service Rep','Admin Assistant','Sales Associate','Team Lead'];
const CITIES=[['Vancouver','BC','V5K 1A1'],['Surrey','BC','V3S 2B2'],['Toronto','ON','M4B 1B3'],['Mississauga','ON','L5A 1A1'],['Halifax','NS','B3H 1A1'],['Moncton','NB','E1C 1A1'],['Charlottetown','PE','C1A 1A1'],["St. John's",'NL','A1C 1A1'],['Burnaby','BC','V5A 2B2'],['Ottawa','ON','K1A 0A1'],['Dartmouth','NS','B2Y 1A1'],['Fredericton','NB','E3B 1A1'],['Summerside','PE','C1N 1A1'],['Corner Brook','NL','A2H 1A1']];
const BANKS=['RBC Royal Bank','TD Canada Trust','Scotiabank','BMO','CIBC','Desjardins','Tangerine','EQ Bank'];
const TIERS=['Gold','Green','Blue','Yellow','Red','Gold','Green','Blue','Yellow','Green','Blue','Red','Orange','Green'];
const AMOUNTS=[500,500,750,750,1000,500,750,1000,500,750,500,1000,750,500];
const rand=a=>a[Math.floor(Math.random()*a.length)];
const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const ph=()=>`(${ri(400,999)}) ${ri(200,999)}-${String(ri(1000,9999))}`;
const em=(fn,ln)=>`${fn.toLowerCase()}.${ln.toLowerCase()}${ri(10,99)}@gmail.com`;
const dob=()=>`${ri(1968,2000)}-${String(ri(1,12)).padStart(2,'0')}-${String(ri(1,28)).padStart(2,'0')}`;
const sinFn=()=>`${ri(100,999)} ${ri(100,999)} ${ri(100,999)}`;
const nextPay=()=>{const d=new Date();d.setDate(d.getDate()+ri(3,14));return d.toISOString().slice(0,10);};
const hireD=()=>{const d=new Date();d.setFullYear(d.getFullYear()-ri(0,5));d.setMonth(ri(0,11));return d.toISOString().slice(0,10);};
function sbToken(tier){
  const s={Gold:{verifiedIncome:4200,fixedObligations:350,nsfCount:0,oppositionCount:0,avgDailyBalance:1800,accountAgeDays:730,incomeRegularity:'consistent'},Green:{verifiedIncome:3400,fixedObligations:450,nsfCount:0,oppositionCount:0,avgDailyBalance:900,accountAgeDays:500,incomeRegularity:'consistent'},Blue:{verifiedIncome:2800,fixedObligations:500,nsfCount:1,oppositionCount:0,avgDailyBalance:500,accountAgeDays:300,incomeRegularity:'variable'},Yellow:{verifiedIncome:2200,fixedObligations:700,nsfCount:2,oppositionCount:1,avgDailyBalance:200,accountAgeDays:180,incomeRegularity:'variable'},Orange:{verifiedIncome:1800,fixedObligations:900,nsfCount:3,oppositionCount:2,avgDailyBalance:80,accountAgeDays:90,incomeRegularity:'irregular'},Red:{verifiedIncome:900,fixedObligations:1100,nsfCount:5,oppositionCount:3,avgDailyBalance:15,accountAgeDays:95,incomeRegularity:'irregular'}};
  return `sandbox-${tier.toLowerCase()}-seed${ri(100,999)}-${btoa(JSON.stringify(s[tier]||s.Green))}`;
}
function log(msg,cls=''){const el=document.getElementById('log');el.innerHTML+=`\n<span class="${cls}">${msg}</span>`;el.scrollTop=el.scrollHeight;}

async function loadOptionalFees() {
  try {
    const res  = await fetch(RAILWAY + '/api/config/optional-fees');
    const data = await res.json();
    return data.fees || [];
  } catch(err) {
    log('  ⚠ Could not load optional fees config — seeding without fees', 'info');
    return [];
  }
}

function getFeesForProvince(fees, province) {
  return fees.filter(f => {
    if (!f.enabled) return false;
    if (f.provinces?.length > 0) return !f.provinces.includes(province);
    return true;
  }).map(f => ({
    id: f.id, label: f.label,
    fee_type: f.fee_type || 'flat',
    fee: parseFloat(f.fee || 0),
    pct: parseFloat(f.pct || 0),
  }));
}

async function seed(){
  const btn=document.getElementById('btn');
  btn.disabled=true;
  document.getElementById('log').innerHTML='<span class="info">Loading config from Railway…</span>';

  const optionalFees = await loadOptionalFees();
  if (optionalFees.length) {
    log(`  ℹ Loaded ${optionalFees.length} optional fee(s): ${optionalFees.map(f=>f.label+' $'+f.fee).join(', ')}`, 'info');
  }
  log('Posting 14 applications…', 'info');

  let ok=0,fail=0,declined=0;
  for(let i=0;i<14;i++){
    const fn=FIRST[i],ln=LAST[i],loc=CITIES[i],tier=TIERS[i],freq=rand(['weekly','biweekly','monthly']);
    const province = loc[1];
    const selectedFees = getFeesForProvince(optionalFees, province);
    const payload={
      type:'new',
      loan:{amount:AMOUNTS[i],fundMethod:i%2===0?'etransfer':'direct',optionalFees:selectedFees},
      personal:{firstName:fn,lastName:ln,email:em(fn,ln),homePhone:ph(),cellPhone:ph(),dob:dob(),sin:sinFn(),address:`${ri(100,9999)} ${rand(STREETS)}`,city:loc[0],province:loc[1],postal:loc[2],bankruptNow:'no',bankruptPast:'no',sex:rand(['male','female'])},
      employment:{incomeSource:'employed',employer:rand(EMPLOYERS),jobDesc:rand(JOBS),workPhone:ph(),supervisor:`${rand(FIRST)} ${rand(LAST)}`,hireDate:hireD(),paidBy:'direct',payFrequency:freq,monthlyIncome:ri(2200,5500),payFreq:freq,nextPay:nextPay()},
      banking:{flinksLoginId:sbToken(tier),institution:rand(BANKS),transitNumber:String(ri(10000,99999)),institutionNumber:String(ri(100,999)),accountNumber:String(ri(1000000,9999999)),sandbox:true},
      safetyContact:{firstName:rand(FIRST),lastName:rand(LAST),phone:ph(),relationship:rand(['spouse','parent','sibling','friend'])},
      signature:{fullName:`${fn} ${ln}`,timestamp:new Date().toISOString()},
    };
    try{
      const resp=await fetch(`${RAILWAY}/api/apply/new`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      const data=await resp.json();
      if(!resp.ok) throw new Error((data.error||'failed')+' — '+(data.details||[]).join(', ')||JSON.stringify(data).slice(0,120));
      const feeStr = selectedFees.length ? ` fees:$${selectedFees.reduce((s,f)=>s+f.fee,0)}` : '';
      const isDeclined   = data.decision === 'auto_declined' || data.tier?.toLowerCase() === 'red';
      const isAutoApproved = data.decision === 'auto_approved' || data.tier?.toLowerCase() === 'gold';
      const icon    = isDeclined ? '🚫' : '✅';
      const cls     = isDeclined ? 'err' : 'ok';
      const decLabel = isDeclined ? ' — AUTO-DECLINED' : isAutoApproved ? ' — AUTO-APPROVED' : '';
      log(`  ${icon} ${fn} ${ln} (${province}) — ${data.ref||'ok'} — tier:${data.tier||'?'} score:${data.score??'?'}${feeStr}${decLabel}`,cls);
      if (isDeclined) declined++; else ok++;
    }catch(err){
      fail++;
      log(`  ❌ ${fn} ${ln} — ${err.message}`,'err');
    }
    await new Promise(r=>setTimeout(r,400));
  }
  log(`\n${'─'.repeat(50)}`,'info');
  log(`Done — ${ok} approved · ${declined} declined · ${fail} errors.`,(ok+declined)===14?'ok':'info');
  if(ok>0) log(`\nGo to admin.html → Clients tab to see them.\n⚠️  Delete seed-clients.html from your repo when done.`,'info');
  btn.disabled=false;btn.textContent='↻ Run Again';
}
</script>
</body>
</html>
