<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Sky gradient: deep indigo to dark teal horizon -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080615"/>
      <stop offset="35%" stop-color="#0d0b2a"/>
      <stop offset="65%" stop-color="#0f1a3a"/>
      <stop offset="100%" stop-color="#0a2035"/>
    </linearGradient>
    <!-- Aurora gradient -->
    <linearGradient id="aurora1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5B52D8" stop-opacity="0"/>
      <stop offset="30%" stop-color="#5B52D8" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#1DE9C6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aurora2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#1DE9C6" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#5B52D8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5B52D8" stop-opacity="0"/>
    </linearGradient>
    <!-- Mountain gradients -->
    <linearGradient id="mtn_far" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1545"/>
      <stop offset="100%" stop-color="#0d1535"/>
    </linearGradient>
    <linearGradient id="mtn_mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12103a"/>
      <stop offset="100%" stop-color="#0b1228"/>
    </linearGradient>
    <linearGradient id="mtn_near" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0b1f"/>
      <stop offset="100%" stop-color="#080612"/>
    </linearGradient>
    <!-- Lake reflection -->
    <linearGradient id="lake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1e3a"/>
      <stop offset="50%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060c18"/>
    </linearGradient>
    <!-- Snow caps -->
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0d8f0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8899cc" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starblur">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1440" height="900" fill="url(#sky)"/>

  <!-- Stars layer 1 — tiny -->
  <g opacity="0.7" filter="url(#starblur)">
    <circle cx="120" cy="60" r="0.8" fill="white" opacity="0.6"/>
    <circle cx="280" cy="40" r="0.6" fill="white" opacity="0.5"/>
    <circle cx="410" cy="25" r="0.9" fill="white" opacity="0.7"/>
    <circle cx="560" cy="55" r="0.7" fill="white" opacity="0.5"/>
    <circle cx="690" cy="30" r="0.8" fill="white" opacity="0.6"/>
    <circle cx="820" cy="45" r="0.6" fill="white" opacity="0.5"/>
    <circle cx="940" cy="20" r="0.9" fill="white" opacity="0.7"/>
    <circle cx="1080" cy="50" r="0.7" fill="white" opacity="0.5"/>
    <circle cx="1200" cy="35" r="0.8" fill="white" opacity="0.6"/>
    <circle cx="1340" cy="60" r="0.6" fill="white" opacity="0.5"/>
    <circle cx="55" cy="100" r="0.7" fill="white" opacity="0.4"/>
    <circle cx="190" cy="130" r="0.8" fill="white" opacity="0.5"/>
    <circle cx="360" cy="90" r="0.6" fill="white" opacity="0.4"/>
    <circle cx="500" cy="115" r="0.9" fill="white" opacity="0.6"/>
    <circle cx="640" cy="80" r="0.7" fill="white" opacity="0.4"/>
    <circle cx="780" cy="110" r="0.6" fill="white" opacity="0.5"/>
    <circle cx="920" cy="95" r="0.8" fill="white" opacity="0.4"/>
    <circle cx="1050" cy="125" r="0.7" fill="white" opacity="0.5"/>
    <circle cx="1180" cy="85" r="0.6" fill="white" opacity="0.4"/>
    <circle cx="1380" cy="105" r="0.8" fill="white" opacity="0.5"/>
    <circle cx="170" cy="70" r="1.2" fill="#a0c4ff" opacity="0.8"/>
    <circle cx="750" cy="55" r="1.0" fill="#c0d8ff" opacity="0.7"/>
    <circle cx="1100" cy="70" r="1.1" fill="#a0c4ff" opacity="0.8"/>
    <circle cx="300" cy="150" r="0.7" fill="white" opacity="0.4"/>
    <circle cx="870" cy="140" r="0.8" fill="white" opacity="0.5"/>
    <circle cx="1260" cy="120" r="0.6" fill="white" opacity="0.4"/>
  </g>

  <!-- Aurora borealis band 1 -->
  <ellipse cx="500" cy="220" rx="700" ry="80" fill="url(#aurora1)" opacity="0.5" transform="rotate(-8, 500, 220)"/>
  <!-- Aurora band 2 -->
  <ellipse cx="950" cy="180" rx="600" ry="55" fill="url(#aurora2)" opacity="0.45" transform="rotate(5, 950, 180)"/>
  <!-- Aurora shimmer accent -->
  <path d="M0 250 Q360 160 720 200 Q1080 240 1440 170" stroke="#1DE9C6" stroke-width="1.5" fill="none" opacity="0.15"/>
  <path d="M0 270 Q360 185 720 220 Q1080 255 1440 190" stroke="#5B52D8" stroke-width="1" fill="none" opacity="0.12"/>

  <!-- Far distant mountains (lightest, most blue) -->
  <path d="M0 520
    L60 440 L130 480 L200 410 L280 450 L350 385 L430 430
    L510 360 L590 410 L660 370 L730 400 L800 345 L870 390
    L940 360 L1010 395 L1080 355 L1150 390 L1220 365 L1290 400
    L1360 370 L1440 405 L1440 900 L0 900 Z"
    fill="url(#mtn_far)" opacity="0.85"/>
  <!-- Snow on far peaks -->
  <path d="M200 410 L230 435 L260 415 L290 440 L320 418 Z" fill="url(#snow)" opacity="0.3"/>
  <path d="M510 360 L540 390 L570 368 L600 395 L630 372 Z" fill="url(#snow)" opacity="0.3"/>
  <path d="M800 345 L830 378 L860 355 L890 382 L920 360 Z" fill="url(#snow)" opacity="0.3"/>
  <path d="M1080 355 L1110 385 L1140 362 L1170 388 L1200 366 Z" fill="url(#snow)" opacity="0.3"/>

  <!-- Mid mountains (darker) -->
  <path d="M0 560
    L80 470 L160 520 L240 455 L320 505 L400 440 L480 490
    L560 425 L640 475 L720 445 L800 480 L880 420 L960 465
    L1040 435 L1120 470 L1200 445 L1280 475 L1360 450 L1440 480
    L1440 900 L0 900 Z"
    fill="url(#mtn_mid)"/>
  <!-- Snow on mid peaks -->
  <path d="M240 455 L265 478 L285 460 L310 480 L330 462 Z" fill="url(#snow)" opacity="0.45"/>
  <path d="M560 425 L580 450 L600 432 L625 455 L645 436 Z" fill="url(#snow)" opacity="0.45"/>
  <path d="M880 420 L900 448 L925 428 L948 452 L968 432 Z" fill="url(#snow)" opacity="0.45"/>

  <!-- Lake / river reflection in valley (horizontal band) -->
  <path d="M0 660 Q360 645 720 650 Q1080 655 1440 642 L1440 700 Q1080 710 720 705 Q360 700 0 710 Z"
    fill="url(#lake)" opacity="0.75"/>
  <!-- Lake glow / moon reflection -->
  <ellipse cx="720" cy="675" rx="200" ry="12" fill="#1DE9C6" opacity="0.06" filter="url(#softglow)"/>
  <ellipse cx="720" cy="675" rx="60" ry="4" fill="#00E5FF" opacity="0.12"/>

  <!-- Foreground mountains (darkest) -->
  <path d="M0 640
    L100 555 L180 605 L260 540 L340 590 L420 530 L500 575
    L580 520 L660 565 L740 535 L820 570 L900 515 L980 560
    L1060 530 L1140 565 L1220 540 L1300 570 L1380 548 L1440 565
    L1440 900 L0 900 Z"
    fill="url(#mtn_near)"/>

  <!-- Foreground tree silhouettes — left cluster -->
  <g fill="#06050f" opacity="0.95">
    <!-- Left trees -->
    <polygon points="30,900 50,780 70,900"/>
    <polygon points="55,900 80,755 105,900"/>
    <polygon points="85,900 108,770 130,900"/>
    <polygon points="110,900 135,748 158,900"/>
    <polygon points="138,900 162,762 185,900"/>
    <!-- Right trees -->
    <polygon points="1280,900 1302,770 1324,900"/>
    <polygon points="1308,900 1332,752 1355,900"/>
    <polygon points="1338,900 1360,768 1382,900"/>
    <polygon points="1365,900 1390,745 1414,900"/>
    <polygon points="1395,900 1418,762 1440,900"/>
    <!-- Scattered middle-left -->
    <polygon points="210,900 228,820 246,900"/>
    <polygon points="235,900 255,808 275,900"/>
    <!-- Scattered middle-right -->
    <polygon points="1180,900 1200,815 1220,900"/>
    <polygon points="1205,900 1226,803 1246,900"/>
  </g>

  <!-- Moon — subtle, upper right -->
  <circle cx="1250" cy="110" r="28" fill="#d8e8f8" opacity="0.18" filter="url(#softglow)"/>
  <circle cx="1250" cy="110" r="22" fill="#e8f0fa" opacity="0.22"/>
  <circle cx="1250" cy="110" r="16" fill="#f0f4fc" opacity="0.3"/>

  <!-- Horizon glow — cyan/teal light on the mountain peaks -->
  <ellipse cx="720" cy="500" rx="800" ry="60" fill="#1DE9C6" opacity="0.04" filter="url(#softglow)"/>
  <ellipse cx="300" cy="480" rx="300" ry="30" fill="#5B52D8" opacity="0.05" filter="url(#softglow)"/>
  <ellipse cx="1100" cy="460" rx="280" ry="25" fill="#00E5FF" opacity="0.04" filter="url(#softglow)"/>

  <!-- Very subtle overall dark vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#050410" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="1440" height="900" fill="url(#vignette)"/>
</svg>